# Nginx — global settings only.
# HTTP-level config (upstreams, server blocks) lives in
# nginx-servers.conf.template, processed by the official nginx
# Docker image entrypoint into /etc/nginx/conf.d/ at startup.

worker_processes      4;              # match cpus constraint; auto=224 on this host
worker_rlimit_nofile  65535;
pid                   /tmp/nginx.pid;

error_log  /dev/stderr warn;

events {
    worker_connections  4096;
    use                 epoll;    # Linux best-in-class poller
    multi_accept        on;       # accept all pending connections at once
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    include       /etc/nginx/conf.d/*.conf;
}
